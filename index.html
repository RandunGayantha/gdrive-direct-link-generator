<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDrive Direct Link Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 450px; text-align: center; border: 1px solid #333; }
        h1 { font-size: 1.5rem; margin-bottom: 20px; color: #00ff88; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #444; border-radius: 6px; background: #2d2d2d; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #00ff88; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .btn-convert { background: #00ff88; color: #000; }
        .btn-convert:hover { background: #00cc6e; }
        .btn-copy { background: #333; color: #00ff88; border: 1px solid #00ff88; display: none; }
        .btn-copy:hover { background: #00ff88; color: #000; }
        #result { margin-top: 15px; font-size: 0.9rem; word-break: break-all; color: #bbb; background: #111; padding: 10px; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>GDrive Direct Link</h1>
    <input type="text" id="urlInput" placeholder="Paste Google Drive Link here...">
    <button class="btn-convert" onclick="convert()">Generate Direct Link</button>
    
    <div id="result"></div>
    <button id="copyBtn" class="btn-copy" onclick="copyLink()">Copy to Clipboard</button>
</div>

<script>
    function convert() {
        const input = document.getElementById('urlInput').value;
        const resultDiv = document.getElementById('result');
        const copyBtn = document.getElementById('copyBtn');
        
        // Regex to extract ID from Drive URL
        const match = input.match(/\/d\/(.+?)\/(?:view|edit|usp)/) || input.match(/id=(.+?)(?:&|$)/);
        
        if (match && match[1]) {
            const directLink = `https://drive.google.com/uc?export=download&id=${match[1]}`;
            resultDiv.innerText = directLink;
            resultDiv.style.display = 'block';
            copyBtn.style.display = 'block';
        } else {
            alert("Invalid Google Drive Link!");
        }
    }

    function copyLink() {
        const text = document.getElementById('result').innerText;
        navigator.clipboard.writeText(text);
        alert("Link copied!");
    }
</script>

</body>
</html>
